// Helper: load from Supabase or localStorage
async function dbLoad(table, localKey, def) {
  if (!DB_READY) {
    try { const s = localStorage.getItem(localKey); return s ? JSON.parse(s) : def; }
    catch(e) { return def; }
  }
  const { data, error } = await supabase.from(table).select("*").order("created_at", { ascending: true });
  if (error) { console.error("Load error:", error); return def; }
  return data || def;
}

// Helper: upsert a single row to Supabase
async function dbUpsert(table, row) {
  if (!DB_READY) return;
  const { error } = await supabase.from(table).upsert(row);
  if (error) console.error("Upsert error:", error);
}

// Helper: delete a row from Supabase
async function dbDelete(table, id) {
  if (!DB_READY) return;
  const { error } = await supabase.from(table).delete().eq("id", id);
  if (error) console.error("Delete error:", error);
}

function getDueDate(lastDone,days){const d=new Date(lastDone);d.setDate(d.getDate()+days);return d;}
function daysUntil(lastDone,days){const due=getDueDate(lastDone,days);const today=new Date();today.setHours(0,0,0,0);due.setHours(0,0,0,0);return Math.ceil((due-today)/86400000);}
function dateDiff(dueDate){if(!dueDate)return null;const today=new Date();today.setHours(0,0,0,0);const due=new Date(dueDate);due.setHours(0,0,0,0);return Math.ceil((due-today)/86400000);}
function readFile(file,cb){
  try {
    const r=new FileReader();
    r.onerror=()=>{ alert("Could not read photo. Please try again."); };
    r.onload=e=>{
      try {
        const img=new Image();
        img.onerror=()=>{ alert("Could not load photo. Please try again."); };
        img.onload=()=>{
          try {
            const MAX=600;
            let w=img.width||600, h=img.height||600;
            if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} }
            else    { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
            const canvas=document.createElement("canvas");
            canvas.width=w; canvas.height=h;
            const ctx=canvas.getContext("2d");
            ctx.drawImage(img,0,0,w,h);
            const result=canvas.toDataURL("image/jpeg",0.6);
            cb(result);
          } catch(err) {
            // Canvas failed - just use original but warn
            console.error("Canvas error:",err);
            cb(e.target.result);
          }
        };
        img.src=e.target.result;
      } catch(err) {
        console.error("Image load error:",err);
        cb(e.target.result);
      }
    };
    r.readAsDataURL(file);
  } catch(err) {
    console.error("FileReader error:",err);
    alert("Photo error: "+err.message);
  }
}

  function openLog(equipId,taskId){const eq=equipment.find(e=>e.id===equipId);setLogModal({equipId,task:eq.tasks.find(t=>t.id===taskId)});setLogNote("");setLogDate(new Date().toISOString().split("T")[0]);}
  function submitLog(){const{equipId,task}=logModal;setEquipment(prev=>prev.map(eq=>eq.id!==equipId?eq:{...eq,tasks:eq.tasks.map(t=>t.id===task.id?{...t,lastDone:logDate}:t)}));const eq=equipment.find(e=>e.id===equipId);setHistory(prev=>[{id:Date.now(),date:logDate,equipName:eq.name,taskName:task.name,note:logNote},...prev]);setLogModal(null);}
  function addEquip(){if(!newEq.name.trim())return;setEquipment(p=>[...p,{id:Date.now(),...newEq,tasks:[]}]);setNewEq({name:"",brand:"",model:"",serial:"",icon:"🔧",photo:null,owner:""});setShowAddEq(false);}
  function saveEditEq(){if(!editEq.name.trim())return;setEquipment(p=>p.map(e=>e.id===editEq.id?{...e,...editEq}:e));setEditEq(null);}
  function delEquip(id){setEquipment(p=>p.filter(e=>e.id!==id));setDeleteEqId(null);}
  function addRem(){if(!newRem.text.trim())return;setReminders(p=>[...p,{id:Date.now(),...newRem,done:false}]);setNewRem({text:"",category:"General",dueDate:"",repeat:"none",photo:null,owner:""});setShowAddRem(false);}
  function addProp(){if(!newProp.title.trim())return;setPropTodos(p=>[...p,{id:Date.now(),...newProp,done:false,addedDate:new Date().toISOString().split("T")[0]}]);setNewProp({title:"",area:"Yard",priority:"Medium",notes:"",photo:null,owner:""});setShowAddProp(false);}
  function saveEditRem(){if(!editRem.text.trim())return;setReminders(p=>p.map(r=>r.id===editRem.id?{...r,...editRem}:r));setEditRem(null);}
  function saveEditProp(){if(!editProp.title.trim())return;setPropTodos(p=>p.map(t=>t.id===editProp.id?{...t,...editProp}:t));setEditProp(null);}
  function addTask(){if(!newTask.name.trim())return;const task={id:Date.now(),...newTask,intervalDays:parseInt(newTask.intervalDays)||90};setEquipment(p=>p.map(e=>e.id===selEquip?{...e,tasks:[...e.tasks,task]}:e));setNewTask({name:"",intervalDays:90,lastDone:new Date().toISOString().split("T")[0]});setShowAddTask(false);}
  function saveEditTask(){if(!editTask.name.trim())return;setEquipment(p=>p.map(e=>e.id===selEquip?{...e,tasks:e.tasks.map(t=>t.id===editTask.id?{...t,...editTask,intervalDays:parseInt(editTask.intervalDays)||90}:t)}:e));setEditTask(null);}
  function delTask(taskId){setEquipment(p=>p.map(e=>e.id===selEquip?{...e,tasks:e.tasks.filter(t=>t.id!==taskId)}:e));}

  function exportData(){
    const data={equipment,history,reminders,propTodos,exportedAt:new Date().toISOString()};
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="homekeep-backup.json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.equipment||!data.reminders||!data.propTodos){setImportError("Invalid backup file.");return;}
        setEquipment(data.equipment);
        setHistory(data.history||[]);
        setReminders(data.reminders);
        setPropTodos(data.propTodos);
        setShowDataTools(false);
        setImportError("");
        alert("Data imported successfully!");
      }catch(err){setImportError("Could not read file. Make sure it is a HomeKeep backup.");}
    };
    reader.readAsText(file);
  }

  const activeRem=reminders.filter(r=>!r.done&&(remFilter==="All"||r.category===remFilter)).sort((a,b)=>(a.dueDate?dateDiff(a.dueDate):9999)-(b.dueDate?dateDiff(b.dueDate):9999));
  const doneRem=reminders.filter(r=>r.done&&(remFilter==="All"||r.category===remFilter));
  const activeProp=propTodos.filter(t=>!t.done&&(propFilter==="All"||t.area===propFilter)).sort((a,b)=>({Urgent:0,High:1,Medium:2,Low:3}[a.priority]-{Urgent:0,High:1,Medium:2,Low:3}[b.priority]));
  const doneProp=propTodos.filter(t=>t.done&&(propFilter==="All"||t.area===propFilter));

  return (
    <div>
      <header style={{background:"linear-gradient(135deg,#1e3a5f,#2d5282)",color:"white",padding:"16px 24px"}}>
        <div style={{maxWidth:960,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div style={{fontSize:26,background:"rgba(255,255,255,0.15)",borderRadius:10,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center"}}>🏠</div>
            <div>
              <div style={{fontSize:20,fontWeight:700}}>HomeKeep</div>
              <div style={{fontSize:11,opacity:0.7}}>Home and Property Management</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {overdueCount>0&&<span style={{padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:600,background:"#fee2e2",color:"#dc2626",border:"1px solid #fecaca"}}>🚨 {overdueCount} Overdue</span>}
            {soonCount>0&&<span style={{padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:600,background:"#fef3c7",color:"#d97706",border:"1px solid #fde68a"}}>⏰ {soonCount} Due Soon</span>}
            {pendingRem>0&&<span style={{padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:600,background:"#dbeafe",color:"#2563eb",border:"1px solid #bfdbfe"}}>📋 {pendingRem} Reminders</span>}
            {urgentProp>0&&<span style={{padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:600,background:"#f3e8ff",color:"#7c3aed",border:"1px solid #e9d5ff"}}>🏗️ {urgentProp} Property</span>}
          </div>
          {DB_READY&&<div style={{fontSize:11,color:syncing?"#fbbf24":"#6ee7b7",opacity:0.8,display:"flex",alignItems:"center",gap:4}}>
            {syncing?"⟳ Syncing...":"✓ "+syncStatus}
          </div>}
        </div>
      </header>
      <nav style={{background:"#1e293b",display:"flex",gap:2,padding:"6px 20px",alignItems:"center"}}>
        <button style={{background:view==="home"?"rgba(255,255,255,0.1)":"none",border:"none",color:view==="home"?"white":"#94a3b8",padding:"8px 18px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:view==="home"?600:500}} onClick={()=>{setView("home");setSection(null);setSelEquip(null);}}>🏠 Home</button>
        <button style={{background:view==="log"?"rgba(255,255,255,0.1)":"none",border:"none",color:view==="log"?"white":"#94a3b8",padding:"8px 18px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:view==="log"?600:500}} onClick={()=>setView("log")}>📋 History</button>
        <button style={{background:"none",border:"none",color:"#94a3b8",padding:"8px 18px",borderRadius:6,cursor:"pointer",fontSize:13,marginLeft:"auto"}} onClick={()=>setShowDataTools(true)}>⚙️ Data</button>
      </nav>
      <main style={{maxWidth:960,margin:"0 auto",padding:"24px 16px"}}>

        {(view==="home"||(view==="dashboard"&&!selEquip))&&<div>

          {allTasks.filter(t=>t.due<=7).length>0&&<div style={{background:"white",border:"1.5px solid #fecaca",borderLeft:"4px solid #ef4444",borderRadius:10,padding:16,marginBottom:24}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"#dc2626"}}>Equipment Needs Attention</div>
            {allTasks.filter(t=>t.due<=7).map(t=>(
              <div key={t.equipId+"-"+t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:"1px solid #fee2e2",flexWrap:"wrap",gap:8}}>
                <span style={{fontSize:14}}>{t.equipIcon} <strong>{t.equipName}</strong> - {t.name}</span>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><Badge days={t.due}/><button style={{background:"#16a34a",color:"white",border:"none",padding:"5px 12px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}} onClick={()=>openLog(t.equipId,t.id)}>Log It</button></div>
              </div>
            ))}
          </div>}

          {section==="equipment"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div><h2 style={{fontSize:18,fontWeight:700,color:"#0f172a",marginBottom:2}}>Your Equipment</h2><p style={{color:"#94a3b8",fontSize:12}}>Click any card to view tasks</p></div>
            <button style={ADDBTN} onClick={()=>setShowAddEq(true)}>+ Add Equipment</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14,marginBottom:32}}>
            {equipment.map(eq=>{
              const tasks=eq.tasks.map(t=>({...t,due:daysUntil(t.lastDone,t.intervalDays)}));
              const urgent=tasks.some(t=>t.due<0);
              const soon=tasks.some(t=>t.due>=0&&t.due<=7);
              const next=[...tasks].sort((a,b)=>a.due-b.due)[0];
              const topColor=urgent?"#ef4444":soon?"#f59e0b":"#22c55e";
              return(
                <div key={eq.id} style={{background:"white",borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1.5px solid #e2e8f0",borderTop:"3px solid "+topColor,overflow:"hidden",display:"flex",flexDirection:"column"}}>
                  {eq.photo&&<img src={eq.photo} alt={eq.name} style={{width:"100%",height:100,objectFit:"cover"}}/>}
                  <div style={{padding:"14px 14px 8px",flex:1,cursor:"pointer"}} onClick={()=>{setSelEquip(eq.id);setView("detail");setActiveTab("tasks");setSection("equipment");}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{fontSize:28}}>{eq.icon}</span>
                      <div style={{width:10,height:10,borderRadius:"50%",background:topColor}}/>
                    </div>
                    <div style={{fontWeight:700,fontSize:15,marginBottom:2,color:"#0f172a"}}>{eq.name}</div>
                    <div style={{fontSize:12,color:"#94a3b8",marginBottom:2}}>{eq.brand} - {eq.model}</div>
                    {eq.serial&&<div style={{fontSize:11,color:"#94a3b8",marginBottom:4,fontFamily:"monospace"}}>S/N: {eq.serial}</div>}
                    {eq.owner&&<div style={{fontSize:11,color:"#0369a1",marginBottom:4}}>Owner: {eq.owner}</div>}
                    {next&&<div style={{fontSize:12,marginBottom:4,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><Badge days={next.due}/> {next.name}</div>}
                    <div style={{fontSize:11,color:"#cbd5e1"}}>{eq.tasks.length} tasks</div>
                  </div>
                  <div style={{padding:"8px 14px 12px",display:"flex",gap:6,alignItems:"center",borderTop:"1px solid #f1f5f9",flexWrap:"wrap"}}>
                    <PhotoBtn small photo={eq.photo} onPhoto={photo=>setEquipment(p=>p.map(e=>e.id===eq.id?{...e,photo}:e))}/>
                    <button style={ICONBTN} onClick={()=>setEditEq({...eq})}>Edit</button>
                    <button style={ICONBTN} onClick={()=>setDeleteEqId(eq.id)}>Delete</button>
                    <button style={{...ICONBTN,marginLeft:"auto",fontSize:12}} onClick={()=>window.open("https://www.google.com/search?q="+encodeURIComponent(eq.brand+" "+eq.model+" parts"))}>Find Parts</button>
                  </div>
                </div>
              );
            })}
          </div>

          </div>}

          {section==="reminders"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div><h2 style={{fontSize:18,fontWeight:700,color:"#0f172a",marginBottom:2}}>Household Maintenance</h2><p style={{color:"#94a3b8",fontSize:12}}>Chores, reminders, and recurring tasks</p></div>
            <button style={ADDBTN} onClick={()=>setShowAddRem(true)}>+ Add Reminder</button>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {["All",...REM_CATS].map(cat=>(
              <button key={cat} style={pillSty(remFilter===cat)} onClick={()=>setRemFilter(cat)}>
                {cat!=="All"&&<span style={{width:7,height:7,borderRadius:"50%",background:remFilter===cat?"white":REM_COLORS[cat],display:"inline-block",flexShrink:0}}/>}
                {cat}
              </button>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {activeRem.length===0&&<div style={{textAlign:"center",padding:36,color:"#94a3b8",background:"white",borderRadius:10,border:"1.5px dashed #e2e8f0"}}>All caught up! Add a reminder to get started.</div>}
            {activeRem.map(r=>{
              const diff=r.dueDate?dateDiff(r.dueDate):null;
              return(
                <div key={r.id} style={{marginBottom:0}}>
                  <div style={rowSty(diff!==null&&diff<0,diff!==null&&diff<=3)}>
                    <button style={chkSty(false)} onClick={()=>setReminders(p=>p.map(x=>x.id===r.id?{...x,done:true}:x))}>v</button>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:600,marginBottom:4,color:"#0f172a"}}>{r.text}</div>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={tagSty(REM_COLORS[r.category]||"#64748b")}>{r.category}</span>
                        {r.dueDate&&<Badge days={diff}/>}
                        {r.repeat!=="none"&&<span style={{fontSize:11,color:"#94a3b8",background:"#f1f5f9",padding:"2px 7px",borderRadius:8}}>Repeats: {r.repeat}</span>}
                        <OwnerTag owner={r.owner}/>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
                      <PhotoBtn small photo={r.photo} onPhoto={photo=>setReminders(p=>p.map(x=>x.id===r.id?{...x,photo}:x))}/>
                      <button style={ICONBTN} onClick={()=>setEditRem({...r})}>✏️</button>
                      <button style={{background:"none",border:"none",color:"#cbd5e1",cursor:"pointer",fontSize:15,padding:"4px"}} onClick={()=>setReminders(p=>p.filter(x=>x.id!==r.id))}>X</button>
                    </div>
                  </div>
                  {r.photo&&<img src={r.photo} alt="reminder" style={{maxWidth:"100%",maxHeight:120,borderRadius:"0 0 10px 10px",display:"block",marginTop:-1}}/>}
                </div>
              );
            })}
            {reminders.filter(r=>r.done).length>0&&(
              <div>
                <button style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:12,padding:"8px 0"}} onClick={()=>setShowDoneRem(!showDoneRem)}>{showDoneRem?"Hide":"Show"} {reminders.filter(r=>r.done).length} completed</button>
                {showDoneRem&&doneRem.map(r=>(
                  <div key={r.id} style={{...rowSty(false,false),opacity:0.5,marginBottom:8}}>
                    <button style={chkSty(true)} onClick={()=>setReminders(p=>p.map(x=>x.id===r.id?{...x,done:false}:x))}>v</button>
                    <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,textDecoration:"line-through",color:"#94a3b8"}}>{r.text}</div></div>
                    <button style={{background:"none",border:"none",color:"#cbd5e1",cursor:"pointer",fontSize:15}} onClick={()=>setReminders(p=>p.filter(x=>x.id!==r.id))}>X</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          </div>}

          {section==="property"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div><h2 style={{fontSize:18,fontWeight:700,color:"#0f172a",marginBottom:2}}>Property Management</h2><p style={{color:"#94a3b8",fontSize:12}}>One-off jobs and repairs</p></div>
            <button style={ADDBTN} onClick={()=>setShowAddProp(true)}>+ Add Job</button>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
            {PRIORITIES.slice().reverse().map(p=>{const c=propTodos.filter(t=>!t.done&&t.priority===p).length;if(!c)return null;return <span key={p} style={{padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:600,background:PCOLORS[p]+"20",color:PCOLORS[p],border:"1px solid "+PCOLORS[p]+"40"}}>{p}: {c}</span>;})}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {["All",...AREAS].map(area=>(
              <button key={area} style={pillSty(propFilter===area)} onClick={()=>setPropFilter(area)}>
                {area!=="All"&&<span style={{width:7,height:7,borderRadius:"50%",background:propFilter===area?"white":ACOLORS[area],display:"inline-block",flexShrink:0}}/>}
                {area}
              </button>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {activeProp.length===0&&<div style={{textAlign:"center",padding:36,color:"#94a3b8",background:"white",borderRadius:10,border:"1.5px dashed #e2e8f0"}}>No property jobs yet. Tap + Add Job to log one.</div>}
            {activeProp.map(todo=>(
              <div key={todo.id} style={{background:"white",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,0.05)",border:"1.5px solid #f1f5f9",overflow:"hidden"}}>
                <div style={{padding:"12px 14px",display:"flex",alignItems:"flex-start",gap:12}}>
                  <button style={chkSty(false)} onClick={()=>setPropTodos(p=>p.map(t=>t.id===todo.id?{...t,done:true}:t))}>v</button>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,marginBottom:4,color:"#0f172a"}}>{todo.title}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span style={tagSty(ACOLORS[todo.area]||"#64748b")}>{todo.area}</span>
                      <span style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600,background:PCOLORS[todo.priority]+"20",color:PCOLORS[todo.priority],border:"1px solid "+PCOLORS[todo.priority]+"40"}}>{todo.priority}</span>
                      <span style={{fontSize:11,color:"#94a3b8",background:"#f1f5f9",padding:"2px 7px",borderRadius:8}}>{new Date(todo.addedDate).toLocaleDateString()}</span>
                      <OwnerTag owner={todo.owner}/>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
                    <PhotoBtn small photo={todo.photo} onPhoto={photo=>setPropTodos(p=>p.map(t=>t.id===todo.id?{...t,photo}:t))}/>
                    {todo.notes&&<button style={{background:"none",border:"1px solid #e2e8f0",borderRadius:5,padding:"3px 7px",cursor:"pointer",fontSize:12,color:"#64748b"}} onClick={()=>setExpandedTodo(expandedTodo===todo.id?null:todo.id)}>{expandedTodo===todo.id?"Hide":"Notes"}</button>}
                    <button style={ICONBTN} onClick={()=>setEditProp({...todo})}>✏️</button>
                    <button style={{background:"none",border:"none",color:"#cbd5e1",cursor:"pointer",fontSize:15}} onClick={()=>setPropTodos(p=>p.filter(t=>t.id!==todo.id))}>X</button>
                  </div>
                </div>
                {todo.photo&&<img src={todo.photo} alt="property" style={{width:"100%",maxHeight:140,objectFit:"cover",display:"block"}}/>}
                {expandedTodo===todo.id&&todo.notes&&<div style={{background:"#f8fafc",borderTop:"1px solid #f1f5f9",padding:"10px 14px",fontSize:13,color:"#475569"}}>{todo.notes}</div>}
              </div>
            ))}
            {propTodos.filter(t=>t.done).length>0&&(
              <div>
                <button style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:12,padding:"8px 0"}} onClick={()=>setShowDoneProp(!showDoneProp)}>{showDoneProp?"Hide":"Show"} {propTodos.filter(t=>t.done).length} completed</button>
                {showDoneProp&&doneProp.map(todo=>(
                  <div key={todo.id} style={{...rowSty(false,false),opacity:0.5,marginBottom:8}}>
                    <button style={chkSty(true)} onClick={()=>setPropTodos(p=>p.map(t=>t.id===todo.id?{...t,done:false}:t))}>v</button>
                    <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,textDecoration:"line-through",color:"#94a3b8"}}>{todo.title}</div></div>
                    <button style={{background:"none",border:"none",color:"#cbd5e1",cursor:"pointer",fontSize:15}} onClick={()=>setPropTodos(p=>p.filter(t=>t.id!==todo.id))}>X</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          </div>}

          </div>}

          {showAddEq&&<Modal title="Add New Equipment" onClose={()=>setShowAddEq(false)}>
            <Fld label="Name *"><input style={INP} value={newEq.name} placeholder="e.g. Riding Mower" onChange={e=>setNewEq({...newEq,name:e.target.value})}/></Fld>
            <Fld label="Brand"><input style={INP} value={newEq.brand} placeholder="e.g. Husqvarna" onChange={e=>setNewEq({...newEq,brand:e.target.value})}/></Fld>
            <Fld label="Model"><input style={INP} value={newEq.model} placeholder="e.g. YTH18542" onChange={e=>setNewEq({...newEq,model:e.target.value})}/></Fld>
            <Fld label="Serial Number"><input style={INP} value={newEq.serial} placeholder="e.g. ABC-1234567" onChange={e=>setNewEq({...newEq,serial:e.target.value})}/></Fld>
            <Fld label="Assigned To"><input style={INP} value={newEq.owner} placeholder="e.g. Dad, Contractor..." onChange={e=>setNewEq({...newEq,owner:e.target.value})}/></Fld>
            <Fld label="Icon"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{ICONS.map(icon=><button key={icon} style={icoSty(newEq.icon===icon)} onClick={()=>setNewEq({...newEq,icon})}>{icon}</button>)}</div></Fld>
            <Fld label="Photo (optional)"><PhotoBtn photo={newEq.photo} onPhoto={photo=>setNewEq({...newEq,photo})}/></Fld>
            <div style={FOOT}><button style={CANCELBTN} onClick={()=>setShowAddEq(false)}>Cancel</button><button style={SAVEBTN()} onClick={addEquip}>Add Equipment</button></div>
          </Modal>}

          {editEq&&<Modal title="Edit Equipment" onClose={()=>setEditEq(null)}>
            <Fld label="Name *"><input style={INP} value={editEq.name} onChange={e=>setEditEq({...editEq,name:e.target.value})}/></Fld>
            <Fld label="Brand"><input style={INP} value={editEq.brand} onChange={e=>setEditEq({...editEq,brand:e.target.value})}/></Fld>
            <Fld label="Model"><input style={INP} value={editEq.model} onChange={e=>setEditEq({...editEq,model:e.target.value})}/></Fld>
            <Fld label="Serial Number"><input style={INP} value={editEq.serial||""} onChange={e=>setEditEq({...editEq,serial:e.target.value})}/></Fld>
            <Fld label="Assigned To"><input style={INP} value={editEq.owner||""} onChange={e=>setEditEq({...editEq,owner:e.target.value})}/></Fld>
            <Fld label="Icon"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{ICONS.map(icon=><button key={icon} style={icoSty(editEq.icon===icon)} onClick={()=>setEditEq({...editEq,icon})}>{icon}</button>)}</div></Fld>
            <Fld label="Photo"><PhotoBtn photo={editEq.photo} onPhoto={photo=>setEditEq({...editEq,photo})}/></Fld>
            <div style={FOOT}><button style={CANCELBTN} onClick={()=>setEditEq(null)}>Cancel</button><button style={SAVEBTN()} onClick={saveEditEq}>Save Changes</button></div>
          </Modal>}

          {deleteEqId&&<Modal title="Delete Equipment?" onClose={()=>setDeleteEqId(null)}>
            <p style={{color:"#64748b",fontSize:14,marginBottom:20}}>Delete <strong>{equipment.find(e=>e.id===deleteEqId)&&equipment.find(e=>e.id===deleteEqId).name}</strong>? This cannot be undone.</p>
            <div style={FOOT}><button style={CANCELBTN} onClick={()=>setDeleteEqId(null)}>Cancel</button><button style={SAVEBTN("#dc2626")} onClick={()=>delEquip(deleteEqId)}>Delete</button></div>
          </Modal>}

          {showAddRem&&<Modal title="Add Household Reminder" onClose={()=>setShowAddRem(false)}>
            <Fld label="What needs doing? *"><input style={INP} value={newRem.text} placeholder="e.g. Clean gutters" onChange={e=>setNewRem({...newRem,text:e.target.value})}/></Fld>
            <Fld label="Category"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{REM_CATS.map(cat=><button key={cat} style={catSty(newRem.category===cat,REM_COLORS[cat])} onClick={()=>setNewRem({...newRem,category:cat})}>{cat}</button>)}</div></Fld>
            <Fld label="Due Date"><input type="date" style={INP} value={newRem.dueDate} onChange={e=>setNewRem({...newRem,dueDate:e.target.value})}/></Fld>
            <Fld label="Repeats"><select style={INP} value={newRem.repeat} onChange={e=>setNewRem({...newRem,repeat:e.target.value})}><option value="none">Does not repeat</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select></Fld>
            <Fld label="Assigned To"><input style={INP} value={newRem.owner} placeholder="e.g. Dad, Mom, Kids..." onChange={e=>setNewRem({...newRem,owner:e.target.value})}/></Fld>
            <Fld label="Photo (optional)"><PhotoBtn photo={newRem.photo} onPhoto={photo=>setNewRem({...newRem,photo})}/></Fld>
            <div style={FOOT}><button style={CANCELBTN} onClick={()=>setShowAddRem(false)}>Cancel</button><button style={SAVEBTN()} onClick={addRem}>Add Reminder</button></div>
          </Modal>}

          {editRem&&<Modal title="Edit Reminder" onClose={()=>setEditRem(null)}>
            <Fld label="What needs doing? *"><input style={INP} value={editRem.text} onChange={e=>setEditRem({...editRem,text:e.target.value})}/></Fld>
            <Fld label="Category"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{REM_CATS.map(cat=><button key={cat} style={catSty(editRem.category===cat,REM_COLORS[cat])} onClick={()=>setEditRem({...editRem,category:cat})}>{cat}</button>)}</div></Fld>
            <Fld label="Due Date"><input type="date" style={INP} value={editRem.dueDate||""} onChange={e=>setEditRem({...editRem,dueDate:e.target.value})}/></Fld>
            <Fld label="Repeats"><select style={INP} value={editRem.repeat} onChange={e=>setEditRem({...editRem,repeat:e.target.value})}><option value="none">Does not repeat</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select></Fld>
            <Fld label="Assigned To"><input style={INP} value={editRem.owner||""} placeholder="e.g. Dad, Mom..." onChange={e=>setEditRem({...editRem,owner:e.target.value})}/></Fld>
            <Fld label="Photo"><PhotoBtn photo={editRem.photo} onPhoto={photo=>setEditRem({...editRem,photo})}/></Fld>
            <div style={FOOT}><button style={CANCELBTN} onClick={()=>setEditRem(null)}>Cancel</button><button style={SAVEBTN()} onClick={saveEditRem}>Save Changes</button></div>
          </Modal>}

          {showAddProp&&<Modal title="Add Property Job" onClose={()=>setShowAddProp(false)}>
            <Fld label="What needs doing? *"><input style={INP} value={newProp.title} placeholder="e.g. Fix fence panel" onChange={e=>setNewProp({...newProp,title:e.target.value})}/></Fld>
            <Fld label="Area"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{AREAS.map(area=><button key={area} style={catSty(newProp.area===area,ACOLORS[area])} onClick={()=>setNewProp({...newProp,area})}>{area}</button>)}</div></Fld>
            <Fld label="Priority"><div style={{display:"flex",gap:8}}>{PRIORITIES.map(p=><button key={p} style={{...catSty(newProp.priority===p,PCOLORS[p]),flex:1}} onClick={()=>setNewProp({...newProp,priority:p})}>{p}</button>)}</div></Fld>
            <Fld label="Notes"><textarea style={{...INP,height:70,resize:"vertical"}} value={newProp.notes} onChange={e=>setNewProp({...newProp,notes:e.target.value})}/></Fld>
            <Fld label="Assigned To"><input style={INP} value={newProp.owner} placeholder="e.g. Dad, Contractor..." onChange={e=>setNewProp({...newProp,owner:e.target.value})}/></Fld>
            <Fld label="Photo (optional)"><PhotoBtn photo={newProp.photo} onPhoto={photo=>setNewProp({...newProp,photo})}/></Fld>
            <div style={FOOT}><button style={CANCELBTN} onClick={()=>setShowAddProp(false)}>Cancel</button><button style={SAVEBTN()} onClick={addProp}>Add Job</button></div>
          </Modal>}

          {editProp&&<Modal title="Edit Property Job" onClose={()=>setEditProp(null)}>
            <Fld label="What needs doing? *"><input style={INP} value={editProp.title} onChange={e=>setEditProp({...editProp,title:e.target.value})}/></Fld>
            <Fld label="Area"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{AREAS.map(area=><button key={area} style={catSty(editProp.area===area,ACOLORS[area])} onClick={()=>setEditProp({...editProp,area})}>{area}</button>)}</div></Fld>
            <Fld label="Priority"><div style={{display:"flex",gap:8}}>{PRIORITIES.map(p=><button key={p} style={{...catSty(editProp.priority===p,PCOLORS[p]),flex:1}} onClick={()=>setEditProp({...editProp,priority:p})}>{p}</button>)}</div></Fld>
            <Fld label="Notes"><textarea style={{...INP,height:70,resize:"vertical"}} value={editProp.notes||""} onChange={e=>setEditProp({...editProp,notes:e.target.value})}/></Fld>
            <Fld label="Assigned To"><input style={INP} value={editProp.owner||""} placeholder="e.g. Dad, Contractor..." onChange={e=>setEditProp({...editProp,owner:e.target.value})}/></Fld>
            <Fld label="Photo"><PhotoBtn photo={editProp.photo} onPhoto={photo=>setEditProp({...editProp,photo})}/></Fld>
            <div style={FOOT}><button style={CANCELBTN} onClick={()=>setEditProp(null)}>Cancel</button><button style={SAVEBTN()} onClick={saveEditProp}>Save Changes</button></div>
          </Modal>}

        </div>}

        {view==="detail"&&curEquip&&<div>
          <button style={{background:"white",border:"1.5px solid #e2e8f0",padding:"6px 14px",borderRadius:8,cursor:"pointer",marginBottom:20,fontSize:13,color:"#475569",display:"flex",alignItems:"center",gap:6}} onClick={()=>{setSelEquip(null);setView("dashboard");setSection("equipment");}}>← Equipment</button>
          <div style={{background:"white",borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1.5px solid #e2e8f0",marginBottom:20,overflow:"hidden"}}>
            {curEquip.photo&&<img src={curEquip.photo} alt={curEquip.name} style={{width:"100%",height:160,objectFit:"cover",display:"block"}}/>}
            <div style={{padding:16,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{fontSize:40}}>{curEquip.icon}</span>
              <div>
                <h2 style={{margin:0,fontSize:22,fontWeight:700}}>{curEquip.name}</h2>
                <div style={{color:"#64748b",fontSize:13}}>{curEquip.brand} - Model: {curEquip.model}</div>
                {curEquip.serial&&<div style={{color:"#64748b",fontSize:13}}>Serial: {curEquip.serial}</div>}
                {curEquip.owner&&<div style={{color:"#0369a1",fontSize:13}}>Owner: {curEquip.owner}</div>}
              </div>
              <button style={{...ADDBTN,marginLeft:"auto"}} onClick={()=>window.open("https://www.google.com/search?q="+encodeURIComponent(curEquip.brand+" "+curEquip.model+" parts"))}>Find Parts</button>
            </div>
          </div>
          <div style={{display:"flex",marginBottom:16,borderBottom:"2px solid #e2e8f0"}}>
            <button style={{background:"none",border:"none",padding:"10px 20px",cursor:"pointer",fontSize:14,fontWeight:activeTab==="tasks"?700:500,color:activeTab==="tasks"?"#1e3a5f":"#94a3b8",borderBottom:activeTab==="tasks"?"3px solid #1e3a5f":"none",marginBottom:-2}} onClick={()=>setActiveTab("tasks")}>Maintenance Tasks</button>
            <button style={{background:"none",border:"none",padding:"10px 20px",cursor:"pointer",fontSize:14,fontWeight:activeTab==="history"?700:500,color:activeTab==="history"?"#1e3a5f":"#94a3b8",borderBottom:activeTab==="history"?"3px solid #1e3a5f":"none",marginBottom:-2}} onClick={()=>setActiveTab("history")}>History</button>
          </div>
          {activeTab==="tasks"&&<div>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
              <button style={ADDBTN} onClick={()=>setShowAddTask(true)}>+ Add Task</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {curEquip.tasks.length===0&&<div style={{textAlign:"center",padding:36,color:"#94a3b8",background:"white",borderRadius:10,border:"1.5px dashed #e2e8f0"}}>No tasks yet. Tap + Add Task to create one.</div>}
              {curEquip.tasks.map(task=>{
                const d=daysUntil(task.lastDone,task.intervalDays);
                return(
                  <div key={task.id} style={rowSty(d<0,d>=0&&d<=7)}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:600,marginBottom:4,color:"#0f172a"}}>{task.name}</div>
                      <div style={{fontSize:12,color:"#94a3b8"}}>Every {task.intervalDays} days - Last: {new Date(task.lastDone).toLocaleDateString()} - Due: {getDueDate(task.lastDone,task.intervalDays).toLocaleDateString()}</div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
                      <Badge days={d}/>
                      <button style={{background:"#16a34a",color:"white",border:"none",padding:"5px 10px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}} onClick={()=>openLog(curEquip.id,task.id)}>Log Done</button>
                      <button style={ICONBTN} onClick={()=>setEditTask({...task})}>✏️</button>
                      <button style={{...ICONBTN,color:"#ef4444"}} onClick={()=>delTask(task.id)}>🗑️</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>}
          {activeTab==="history"&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
            {history.filter(h=>h.equipName===curEquip.name).length===0&&<div style={{textAlign:"center",padding:36,color:"#94a3b8",background:"white",borderRadius:10,border:"1.5px dashed #e2e8f0"}}>No history yet.</div>}
            {history.filter(h=>h.equipName===curEquip.name).map(h=>(
              <div key={h.id} style={rowSty(false,false)}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:"#0f172a"}}>{h.taskName}</div>
                  <div style={{fontSize:12,color:"#94a3b8"}}>{new Date(h.date).toLocaleDateString()}</div>
                  {h.note&&<div style={{fontSize:13,color:"#64748b",marginTop:4,fontStyle:"italic"}}>{h.note}</div>}
                </div>
              </div>
            ))}
          </div>}
        {showAddTask&&<Modal title="Add Maintenance Task" onClose={()=>setShowAddTask(false)}>
          <Fld label="Task Name *"><input style={INP} value={newTask.name} placeholder="e.g. Change oil, Replace filter..." onChange={e=>setNewTask({...newTask,name:e.target.value})}/></Fld>
          <Fld label="How often? (days)"><input type="number" style={INP} value={newTask.intervalDays} min="1" onChange={e=>setNewTask({...newTask,intervalDays:e.target.value})}/></Fld>
          <Fld label="Last completed"><input type="date" style={INP} value={newTask.lastDone} onChange={e=>setNewTask({...newTask,lastDone:e.target.value})}/></Fld>
          <div style={FOOT}><button style={CANCELBTN} onClick={()=>setShowAddTask(false)}>Cancel</button><button style={SAVEBTN()} onClick={addTask}>Add Task</button></div>
        </Modal>}

        {editTask&&<Modal title="Edit Task" onClose={()=>setEditTask(null)}>
          <Fld label="Task Name *"><input style={INP} value={editTask.name} onChange={e=>setEditTask({...editTask,name:e.target.value})}/></Fld>
          <Fld label="How often? (days)"><input type="number" style={INP} value={editTask.intervalDays} min="1" onChange={e=>setEditTask({...editTask,intervalDays:e.target.value})}/></Fld>
          <Fld label="Last completed"><input type="date" style={INP} value={editTask.lastDone} onChange={e=>setEditTask({...editTask,lastDone:e.target.value})}/></Fld>
          <div style={FOOT}><button style={CANCELBTN} onClick={()=>setEditTask(null)}>Cancel</button><button style={SAVEBTN()} onClick={saveEditTask}>Save Changes</button></div>
        </Modal>}

        </div>}

        {view==="log"&&<div>
          <h2 style={{fontSize:18,fontWeight:700,margin:"0 0 4px",color:"#0f172a"}}>Maintenance History</h2>
          <p style={{color:"#94a3b8",fontSize:12,marginBottom:16}}>All equipment maintenance recorded</p>
          {history.length===0&&<div style={{textAlign:"center",padding:36,color:"#94a3b8",background:"white",borderRadius:10,border:"1.5px dashed #e2e8f0"}}>No history yet. Log a completed task to see it here.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {history.map(h=>(
              <div key={h.id} style={rowSty(false,false)}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:"#0f172a"}}>{h.equipName} - {h.taskName}</div>
                  <div style={{fontSize:12,color:"#94a3b8"}}>{new Date(h.date).toLocaleDateString()}</div>
                  {h.note&&<div style={{fontSize:13,color:"#64748b",marginTop:4,fontStyle:"italic"}}>{h.note}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>}

      </main>

      {showInstallBanner&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:999,padding:"12px 16px",background:"#1e3a5f",boxShadow:"0 -4px 20px rgba(0,0,0,0.2)"}}>
          <div style={{maxWidth:960,margin:"0 auto",display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:36,flexShrink:0}}>🏠</div>
            <div style={{flex:1}}>
              <div style={{color:"white",fontWeight:700,fontSize:14,marginBottom:2}}>Add HomeKeep to your Home Screen</div>
              <div style={{color:"#93c5fd",fontSize:12,lineHeight:1.4}}>Tap the Share button <strong style={{color:"white"}}>⬆</strong> then <strong style={{color:"white"}}>"Add to Home Screen"</strong> for the full app experience</div>
            </div>
            <button onClick={()=>{setShowInstallBanner(false);localStorage.setItem("hk_install_dismissed","1");}} style={{background:"none",border:"none",color:"#93c5fd",fontSize:22,cursor:"pointer",padding:"4px 8px",flexShrink:0}}>✕</button>
          </div>
        </div>
      )}

      {showDataTools&&<Modal title="Data Tools" onClose={()=>setShowDataTools(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>

          <div style={{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:10,padding:16}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:4,color:"#0369a1"}}>📤 Export Your Data</div>
            <p style={{fontSize:13,color:"#475569",marginBottom:12,lineHeight:1.5}}>Downloads a backup file of all your equipment, tasks, reminders, and property jobs. Use this to transfer your data to another browser or device.</p>
            <button style={{...SAVEBTN("#0369a1"),width:"100%"}} onClick={exportData}>Download Backup File</button>
          </div>

          <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:10,padding:16}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:4,color:"#16a34a"}}>📥 Import Data</div>
            <p style={{fontSize:13,color:"#475569",marginBottom:12,lineHeight:1.5}}>Load a previously exported backup file. This will replace all current data on this device with the data from the file.</p>
            {importError&&<div style={{color:"#dc2626",fontSize:12,marginBottom:8,background:"#fee2e2",padding:"6px 10px",borderRadius:6}}>{importError}</div>}
            <label style={{display:"block",background:"#16a34a",color:"white",padding:"8px 18px",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600,textAlign:"center"}}>
              Choose Backup File
              <input type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
            </label>
          </div>

          <p style={{fontSize:11,color:"#94a3b8",textAlign:"center"}}>Tip: Export from Chrome, then Import on Safari to sync your data.</p>
        </div>
        <div style={FOOT}><button style={CANCELBTN} onClick={()=>setShowDataTools(false)}>Close</button></div>
      </Modal>}

      {logModal&&<Modal title="Log Maintenance" onClose={()=>setLogModal(null)}>
        <p style={{color:"#64748b",fontSize:14,marginBottom:16}}>Recording: <strong>{logModal.task.name}</strong></p>
        <Fld label="Date Completed"><input type="date" style={INP} value={logDate} onChange={e=>setLogDate(e.target.value)}/></Fld>
        <Fld label="Notes (optional)"><textarea style={{...INP,height:80,resize:"vertical"}} value={logNote} onChange={e=>setLogNote(e.target.value)}/></Fld>
        <div style={FOOT}><button style={CANCELBTN} onClick={()=>setLogModal(null)}>Cancel</button><button style={SAVEBTN()} onClick={submitLog}>Save Log</button></div>
      </Modal>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Hide splash screen after app renders
setTimeout(function() {
  var splash = document.getElementById('splash');
  if (splash) {
    splash.classList.add('hidden');
    setTimeout(function() { splash.remove(); }, 400);
  }
}, 600);
</script>
</body>
</html>

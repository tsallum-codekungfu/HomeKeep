  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; color: #1e293b; }
    button, input, select, textarea { font-family: inherit; }
    header { padding-top: max(16px, env(safe-area-inset-top)) !important; }
    main { padding-bottom: max(24px, env(safe-area-inset-bottom)); }
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(160deg, #1e3a5f, #2d5282);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-icon {
      width: 96px; height: 96px; border-radius: 22px;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
    }
    #splash h1 { color: white; font-size: 28px; font-weight: 700; }
    #splash p  { color: #93c5fd; font-size: 14px; }
    #splash-dots { display: flex; gap: 8px; margin-top: 8px; }
    #splash-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.4);
      animation: pulse 1.2s ease-in-out infinite;
    }
    #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    #splash-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1); }
    }
  </style>

function daysUntil(lastDone, intervalDays) {

function readFile(file, cb) {
  try {
    var r = new FileReader();
    r.onerror = function() { alert("Could not read photo. Please try again."); };
    r.onload = function(e) {
      try {
        var img = new Image();
        img.onerror = function() { alert("Could not load photo."); };
        img.onload = function() {
          try {
            var MAX = 600;
            var w = img.width || 600, h = img.height || 600;
            if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
            else       { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
            var canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            cb(canvas.toDataURL("image/jpeg", 0.6));
          } catch(err) { cb(e.target.result); }
        };
        img.src = e.target.result;
      } catch(err) { cb(e.target.result); }
    };
    r.readAsDataURL(file);
  } catch(err) { alert("Photo error: " + err.message); }
}

function Badge(props) {
  var days = props.days;
  if (days === null || days === undefined) return null;
  var bg, color, text;
  if (days < 0) { bg="#fee2e2"; color="#dc2626"; text="Overdue "+Math.abs(days)+"d"; }
  else if (days === 0) { bg="#fee2e2"; color="#dc2626"; text="Due today"; }
  else if (days <= 7) { bg="#fef3c7"; color="#d97706"; text="Due in "+days+"d"; }
  else { bg="#dcfce7"; color="#16a34a"; text="OK "+days+"d"; }
  return <span style={{fontSize:11,background:bg,color:color,padding:"2px 8px",borderRadius:20,fontWeight:600,whiteSpace:"nowrap"}}>{text}</span>;
}

function PhotoBtn(props) {
  var photo = props.photo;
  var onChange = props.onChange;
  function handle(e) {
    var file = e.target.files[0];
    if (!file) return;
    readFile(file, function(data) { onChange(data); });
  }
  if (photo) {
    return (
      <div style={{position:"relative",display:"inline-block"}}>
        <img src={photo} alt="photo" style={{width:80,height:60,objectFit:"cover",borderRadius:6,border:"1.5px solid #e2e8f0"}}/>

      </div>
    );
  }
  return (
    <label style={{display:"inline-flex",alignItems:"center",gap:6,background:"#f1f5f9",border:"1.5px dashed #cbd5e1",padding:"6px 12px",borderRadius:7,cursor:"pointer",fontSize:13,color:"#64748b"}}>

    </label>
  );
}

                <div style={{flex:1}}>
                  <div style={{fontSize:18,fontWeight:700,color:"#0f172a",marginBottom:4}}>Property Management</div>
                  <div style={{fontSize:13,color:"#64748b",marginBottom:8}}>One-off jobs, repairs and projects</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:12,background:"#f1f5f9",color:"#475569",padding:"3px 10px",borderRadius:20,fontWeight:500}}>{propTodos.filter(function(t){ return !t.done; }).length + " jobs"}</span>
                    {urgentProp > 0 && <span style={{fontSize:12,background:"#fef3c7",color:"#d97706",padding:"3px 10px",borderRadius:20,fontWeight:600}}>{urgentProp + " urgent"}</span>}
                  </div>
                </div>
                <div style={{fontSize:20,color:"#cbd5e1",fontWeight:700}}>{">"}</div>
              </div>

            </div>
          </div>
        )}

        {/* -- EQUIPMENT LIST -- */}
        {view === "dashboard" && section === "equipment" && !selEquip && (
          <div>
            <button style={{background:"white",border:"1.5px solid #e2e8f0",padding:"6px 14px",borderRadius:8,cursor:"pointer",marginBottom:20,fontSize:13,color:"#475569"}} onClick={goBack}>Back</button>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div><h2 style={{fontSize:18,fontWeight:700,color:"#0f172a",marginBottom:2}}>Your Equipment</h2><p style={{color:"#94a3b8",fontSize:12}}>Tap any card to view tasks</p></div>
              <button style={ADDBTN} onClick={function(){ setShowAddEq(true); }}>+ Add</button>
            </div>
            {(function(){
              var owners = ["All"].concat(equipment.map(function(e){ return e.owner; }).filter(function(o,i,a){ return o && a.indexOf(o)===i; }));
              if (owners.length > 1) return (
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:6}}>ASSIGNED TO</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {owners.map(function(o){
                      return <button key={o} style={{padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:500,background:eqOwnerFilter===o?"#1e3a5f":"#f1f5f9",color:eqOwnerFilter===o?"white":"#64748b"}} onClick={function(){ setEqOwnerFilter(o); }}>{o}</button>;
                    })}
                  </div>
                </div>
              );
              return null;
            })()}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14,marginBottom:32}}>
              {equipment.filter(function(eq){ return eqOwnerFilter === "All" || eq.owner === eqOwnerFilter; }).map(function(eq){
                var tasks = eq.tasks.map(function(t){ return Object.assign({},t,{due:daysUntil(t.lastDone,t.intervalDays)}); });
                var urgent = tasks.some(function(t){ return t.due < 0; });
                var soon = tasks.some(function(t){ return t.due >= 0 && t.due <= 7; });
                var next = tasks.slice().sort(function(a,b){ return a.due - b.due; })[0];
                var topColor = urgent ? "#ef4444" : soon ? "#f59e0b" : "#22c55e";
                return (
                  <div key={eq.id} style={{background:"white",borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1.5px solid #e2e8f0",display:"flex",flexDirection:"column",overflow:"hidden",borderTop:"4px solid "+topColor}}>
                    {eq.photo && <img src={eq.photo} alt={eq.name} style={{width:"100%",height:100,objectFit:"cover"}}/>}
                    <div style={{padding:"14px 14px 8px",flex:1,cursor:"pointer"}} onClick={function(){ setSelEquip(eq.id); setView("detail"); setActiveTab("tasks"); }}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                        <span style={{fontSize:26}} dangerouslySetInnerHTML={{__html:ICON_EMOJI[eq.icon]||"&#x1F527;"}}></span>
                        <div style={{width:10,height:10,borderRadius:"50%",background:topColor}}/>
                      </div>
                      <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{eq.name}</div>
                      <div style={{fontSize:12,color:"#94a3b8",marginBottom:8}}>{eq.brand} {eq.model}</div>
                      {next && <Badge days={next.due}/>}
                      {eq.owner && <div style={{fontSize:11,color:"#3b82f6",marginTop:6}}>{eq.owner}</div>}
                    </div>
                    <div style={{padding:"8px 14px",borderTop:"1px solid #f1f5f9",display:"flex",gap:6,justifyContent:"flex-end"}}>
                      <button style={ICONBTN} onClick={function(){ setEditEq(Object.assign({},eq)); }}>edit</button>
                      <button style={Object.assign({},ICONBTN,{color:"#ef4444"})} onClick={function(){ setDeleteEqId(eq.id); }}>del</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* -- EQUIPMENT DETAIL -- */}
        {view === "detail" && curEquip && (
          <div>
            <button style={{background:"white",border:"1.5px solid #e2e8f0",padding:"6px 14px",borderRadius:8,cursor:"pointer",marginBottom:20,fontSize:13,color:"#475569"}} onClick={function(){ setSelEquip(null); setView("dashboard"); setSection("equipment"); }}>Back</button>
            <div style={{background:"white",borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",overflow:"hidden",marginBottom:20}}>
              {curEquip.photo && <img src={curEquip.photo} alt={curEquip.name} style={{width:"100%",height:160,objectFit:"cover"}}/>}
              <div style={{padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:24,fontWeight:700,marginBottom:4}}>{curEquip.name}</div>
                    <div style={{fontSize:13,color:"#64748b"}}>{curEquip.brand} {curEquip.model}</div>
                    {curEquip.serial && <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>S/N: {curEquip.serial}</div>}
                    {curEquip.owner && <div style={{fontSize:12,color:"#3b82f6",marginTop:4}}>{curEquip.owner}</div>}
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button style={ICONBTN} onClick={function(){ setEditEq(Object.assign({},curEquip)); }}>edit</button>
                    <button style={Object.assign({},ICONBTN,{color:"#ef4444"})} onClick={function(){ setDeleteEqId(curEquip.id); }}>del</button>

            <Fld label="Notes"><textarea style={Object.assign({},INP,{height:70,resize:"vertical"})} value={newProp.notes} onChange={function(e){ setNewProp(Object.assign({},newProp,{notes:e.target.value})); }}/></Fld>
            <Fld label="Owner"><input style={INP} value={newProp.owner} onChange={function(e){ setNewProp(Object.assign({},newProp,{owner:e.target.value})); }}/></Fld>
            <Fld label="Photo"><PhotoBtn photo={newProp.photo} onChange={function(p){ setNewProp(Object.assign({},newProp,{photo:p})); }}/></Fld>
            <div style={FOOT}>
              <button style={CANCELBTN} onClick={function(){ setShowAddProp(false); }}>Cancel</button>
              <button style={SAVEBTN} onClick={addProp}>Add</button>
            </div>
          </Modal>
        )}

        {editProp && (
          <Modal title="Edit Property Job" onClose={function(){ setEditProp(null); }}>
            <Fld label="Title *"><input style={INP} value={editProp.title} onChange={function(e){ setEditProp(Object.assign({},editProp,{title:e.target.value})); }}/></Fld>
            <Fld label="Area"><select style={INP} value={editProp.area} onChange={function(e){ setEditProp(Object.assign({},editProp,{area:e.target.value})); }}>{PROP_AREAS.map(function(a){ return <option key={a}>{a}</option>; })}</select></Fld>
            <Fld label="Priority"><select style={INP} value={editProp.priority} onChange={function(e){ setEditProp(Object.assign({},editProp,{priority:e.target.value})); }}>{PRIORITIES.map(function(p){ return <option key={p}>{p}</option>; })}</select></Fld>
            <Fld label="Notes"><textarea style={Object.assign({},INP,{height:70,resize:"vertical"})} value={editProp.notes||""} onChange={function(e){ setEditProp(Object.assign({},editProp,{notes:e.target.value})); }}/></Fld>
            <Fld label="Owner"><input style={INP} value={editProp.owner||""} onChange={function(e){ setEditProp(Object.assign({},editProp,{owner:e.target.value})); }}/></Fld>
            <Fld label="Photo"><PhotoBtn photo={editProp.photo} onChange={function(p){ setEditProp(Object.assign({},editProp,{photo:p})); }}/></Fld>
            <div style={FOOT}>
              <button style={CANCELBTN} onClick={function(){ setEditProp(null); }}>Cancel</button>
              <button style={SAVEBTN} onClick={saveEditProp}>Save</button>
            </div>
          </Modal>
        )}

        {showDataTools && (
          <Modal title="Data Tools" onClose={function(){ setShowDataTools(false); setImportError(""); }}>
            <p style={{color:"#64748b",fontSize:13,marginBottom:16}}>Export your data as a backup file, or import a previous backup.</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button style={Object.assign({},ADDBTN,{textAlign:"center"})} onClick={exportData}>Download Backup File</button>
              <label style={{display:"block",background:"#f1f5f9",color:"#475569",border:"none",padding:"8px 16px",borderRadius:7,cursor:"pointer",fontSize:13,textAlign:"center"}}>
                Choose Backup File
                <input type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
              </label>
            </div>
            {importError && <div style={{color:"#ef4444",fontSize:13,marginTop:12}}>{importError}</div>}
          </Modal>
        )}

      </main>

      {showInstallBanner && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:999,padding:"12px 16px",background:"#1e3a5f",boxShadow:"0 -4px 20px rgba(0,0,0,0.2)"}}>
          <div style={{maxWidth:960,margin:"0 auto",display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:32,flexShrink:0}}>&#x1F3E0;</div>
            <div style={{flex:1}}>
              <div style={{color:"white",fontWeight:700,fontSize:14,marginBottom:2}}>Add HomeKeep to your Home Screen</div>
              <div style={{color:"#93c5fd",fontSize:12}}>Tap Share then "Add to Home Screen" for the full app experience</div>
            </div>
            <button onClick={function(){ setShowInstallBanner(false); localStorage.setItem("hk_install_dismissed","1"); }} style={{background:"none",border:"none",color:"#93c5fd",fontSize:22,cursor:"pointer",padding:"4px 8px",flexShrink:0}}>x</button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.render(React.createElement(App, null), document.getElementById("root"));

</script>

<script>
setTimeout(function() {
  var splash = document.getElementById('splash');
  if (splash) {
    splash.classList.add('hidden');
    setTimeout(function() { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 400);
  }
}, 800);

// Pull to refresh on iPhone
var startY = 0;
document.addEventListener('touchstart', function(e) {
  startY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchend', function(e) {
  var endY = e.changedTouches[0].clientY;
  var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
  if (endY - startY > 80 && scrollTop === 0) {
    window.location.reload();
  }
}, {passive: true});
</script>

</body>
</html>

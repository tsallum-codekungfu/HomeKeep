function getDueDate(lastDone, intervalDays) {
  const d = new Date(lastDone); d.setDate(d.getDate() + intervalDays); return d;
}
function getDaysUntil(lastDone, intervalDays) {
  const due = getDueDate(lastDone, intervalDays);
  const today = new Date(); today.setHours(0,0,0,0); due.setHours(0,0,0,0);
  return Math.ceil((due - today) / 86400000);
}
function dateDiff(dueDate) {
  if (!dueDate) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(dueDate); due.setHours(0,0,0,0);
  return Math.ceil((due - today) / 86400000);
}

function PhotoUpload({ photo, onPhoto, small }) {
  function handle(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => onPhoto(ev.target.result);
    reader.readAsDataURL(file);
  }
  if (photo) return (
    <div style={{position:"relative",display:"inline-block"}}>
      <img src={photo} alt="photo" style={{width:small?40:200,height:small?40:160,objectFit:"cover",borderRadius:small?8:10,display:"block"}}/>
      <button onClick={()=>onPhoto(null)} style={{position:"absolute",top:-6,right:-6,background:"#ef4444",color:"white",border:"none",borderRadius:"50%",width:18,height:18,fontSize:10,cursor:"pointer",lineHeight:"18px",textAlign:"center"}}>x</button>
    </div>
  );
  return (
    <label style={{display:"inline-flex",alignItems:"center",gap:4,background:"none",border:"1.5px dashed #94a3b8",borderRadius:8,padding:small?"4px 8px":"10px 16px",cursor:"pointer",fontSize:small?12:13,color:"#64748b"}}>
      {small ? "📷" : "📷 Add Photo"}
      <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handle}/>
    </label>
  );
}

function Badge({ days }) {
  if (days < 0) return <span style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600,background:"#fee2e2",color:"#dc2626",border:"1px solid #fecaca"}}>Overdue {Math.abs(days)}d</span>;
  if (days <= 7) return <span style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600,background:"#fef3c7",color:"#d97706",border:"1px solid #fde68a"}}>Due in {days}d</span>;
  if (days <= 30) return <span style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600,background:"#dbeafe",color:"#2563eb",border:"1px solid #bfdbfe"}}>In {days}d</span>;
  return <span style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600,background:"#dcfce7",color:"#16a34a",border:"1px solid #bbf7d0"}}>In {days}d</span>;
}

          <div style={S.fg}><label style={S.lbl}>Serial Number</label><input style={S.inp} value={data.serial||""} placeholder="e.g. ABC-1234567" onChange={e=>setData({...data,serial:e.target.value})}/></div>
          <div style={S.fg}><label style={S.lbl}>Icon</label><div style={S.iconRow}>{ICONS.map(icon=><button key={icon} style={S.iBtn(data.icon===icon)} onClick={()=>setData({...data,icon})}>{icon}</button>)}</div></div>
          <div style={S.fg}><label style={S.lbl}>Assigned To (optional)</label><input style={S.inp} value={data.owner||""} placeholder="e.g. Dad, Mom, Contractor..." onChange={e=>setData({...data,owner:e.target.value})}/></div>
          <div style={S.fg}><label style={S.lbl}>Photo (optional)</label><PhotoUpload photo={data.photo} onPhoto={photo=>setData({...data,photo})}/></div>
          <div style={S.modalFoot}><button style={S.cancelBtn} onClick={onClose}>Cancel</button><button style={S.saveBtn()} onClick={onSave}>Save</button></div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <header style={S.header}>
        <div style={S.headerInner}>
          <div style={S.logo}>
            <div style={S.logoIcon}>🏠</div>
            <div><div style={S.logoTitle}>HomeKeep</div><div style={S.logoSub}>Home & Property Management</div></div>
          </div>
          <div style={S.chips}>
            {overdueCount>0 && <div style={S.chip("#fee2e2","#dc2626","#fecaca")}>🚨 {overdueCount} Overdue</div>}
            {soonCount>0 && <div style={S.chip("#fef3c7","#d97706","#fde68a")}>⏰ {soonCount} Due Soon</div>}
            {pendingRem>0 && <div style={S.chip("#dbeafe","#2563eb","#bfdbfe")}>📋 {pendingRem} Reminders</div>}
            {urgentProp>0 && <div style={S.chip("#f3e8ff","#7c3aed","#e9d5ff")}>🏗️ {urgentProp} Property</div>}
          </div>
        </div>
      </header>

      <nav style={S.nav}>
        <button style={S.navBtn(view==="dashboard")} onClick={()=>{setView("dashboard");setSelectedEquip(null);}}>📊 Dashboard</button>
        <button style={S.navBtn(view==="log")} onClick={()=>setView("log")}>📋 History</button>
      </nav>

      <main style={S.main}>
        {view==="dashboard" && !selectedEquip && <div>

          {allTasks.filter(t=>t.daysUntil<=7).length>0 && (
            <div style={S.banner}>
              <div style={S.bannerTitle}>⚠️ Equipment Needs Attention</div>
              {allTasks.filter(t=>t.daysUntil<=7).map(t=>(
                <div key={t.equipId+"-"+t.id} style={S.bannerRow}>
                  <span style={{fontSize:14}}>{t.equipIcon} <strong>{t.equipName}</strong> — {t.name}</span>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}><Badge days={t.daysUntil}/><button style={S.logBtn} onClick={()=>markDone(t.equipId,t.id)}>✓ Log It</button></div>
                </div>
              ))}
            </div>
          )}

          <div style={S.secHeader}>
            <div><h2 style={S.secTitle}>🔧 Your Equipment</h2><p style={S.secHint}>Click any card to view tasks and log maintenance</p></div>
            <button style={S.addBtn} onClick={()=>setShowAddEquip(true)}>+ Add Equipment</button>
          </div>
          <div style={S.grid}>
            {equipment.map(eq=>{
              const tasks = eq.tasks.map(t=>({...t,daysUntil:getDaysUntil(t.lastDone,t.intervalDays)}));
              const urgent = tasks.filter(t=>t.daysUntil<0).length>0;
              const soon = tasks.filter(t=>t.daysUntil>=0&&t.daysUntil<=7).length>0;
              const next = [...tasks].sort((a,b)=>a.daysUntil-b.daysUntil)[0];
              return (
                <div key={eq.id} style={S.card(urgent,soon)}>
                  {eq.photo && <img src={eq.photo} alt={eq.name} style={{width:"100%",height:100,objectFit:"cover"}}/>}
                  <div style={S.cardContent} onClick={()=>{setSelectedEquip(eq.id);setView("detail");setActiveTab("tasks");}}>
                    <div style={S.cardTopRow}><span style={{fontSize:28}}>{eq.icon}</span><div style={S.dot(urgent,soon)}/></div>
                    <div style={S.cardName}>{eq.name}</div>
                    <div style={S.cardMeta}>{eq.brand} · {eq.model}</div>
                    {eq.serial && <div style={S.cardSerial}>S/N: {eq.serial}</div>}
                    {eq.owner && <div style={{fontSize:11,color:"#0369a1",marginBottom:3}}>👤 {eq.owner}</div>}
                    {next && <div style={{fontSize:12,marginBottom:4,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><Badge days={next.daysUntil}/>{next.name}</div>}
                    <div style={{fontSize:11,color:"#cbd5e1"}}>{eq.tasks.length} tasks</div>
                  </div>
                  <div style={S.cardActions}>
                    <PhotoUpload small photo={eq.photo} onPhoto={photo=>setEquipment(p=>p.map(e=>e.id===eq.id?{...e,photo}:e))}/>
                    <button style={S.iconBtn} onClick={()=>setEditEquip({...eq})}>✏️</button>
                    <button style={S.iconBtn} onClick={()=>setDeleteEquipId(eq.id)}>🗑️</button>
                    <button style={{...S.iconBtn,marginLeft:"auto",fontSize:12}} onClick={()=>window.open("https://www.google.com/search?q="+encodeURIComponent(eq.brand+" "+eq.model+" parts"))}>🔍 Parts</button>
                  </div>
                </div>
              );
            })}
          </div>

          <div style={S.divider}/>

          <div style={S.secHeader}>
            <div><h2 style={S.secTitle}>🏡 Household Maintenance</h2><p style={S.secHint}>Chores, reminders, and recurring tasks</p></div>
            <button style={S.addBtn} onClick={()=>setShowAddReminder(true)}>+ Add Reminder</button>
          </div>
          <div style={S.filterRow}>
            {["All",...REMINDER_CATS].map(cat=>(
              <button key={cat} style={S.pill(reminderFilter===cat)} onClick={()=>setReminderFilter(cat)}>
                {cat!=="All" && <span style={{width:7,height:7,borderRadius:"50%",background:reminderFilter===cat?"white":reminderCatColors[cat],display:"inline-block"}}/>}
                {cat}
              </button>
            ))}
          </div>
          <div style={S.listStack}>
            {activeRem.length===0 && <div style={S.empty}>All caught up! Tap + Add Reminder to create one.</div>}
            {activeRem.map(r=>{
              const diff = r.dueDate?dateDiff(r.dueDate):null;
              return (
                <div key={r.id} style={S.row(diff!==null&&diff<0, diff!==null&&diff<=3)}>
                  <button style={S.check(false)} onClick={()=>setReminders(p=>p.map(x=>x.id===r.id?{...x,done:true}:x))}>✓</button>
                  <div style={S.rowContent}>
                    <div style={S.rowTitle}>{r.text}</div>
                    <div style={S.rowMeta}>
                      <span style={S.tag(reminderCatColors[r.category]||"#64748b")}>{r.category}</span>
                      {r.dueDate && <Badge days={diff}/>}
                      {r.repeat!=="none" && <span style={S.tagGray}>🔁 {r.repeat}</span>}
                      {r.owner && <span style={{fontSize:11,background:"#e0f2fe",color:"#0369a1",padding:"2px 7px",borderRadius:8,fontWeight:600}}>👤 {r.owner}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <PhotoUpload small photo={r.photo} onPhoto={photo=>setReminders(p=>p.map(x=>x.id===r.id?{...x,photo}:x))}/>
                    <button style={S.delBtn} onClick={()=>setReminders(p=>p.filter(x=>x.id!==r.id))}>✕</button>
                  </div>
                </div>
                {r.photo && <img src={r.photo} alt="reminder" style={{maxWidth:"100%",maxHeight:120,borderRadius:8,marginTop:8,marginLeft:50,display:"block"}}/>}
              );
            })}
            {reminders.filter(r=>r.done).length>0 && (
              <div>
                <button style={S.moreBtn} onClick={()=>setShowDoneReminders(!showDoneReminders)}>{showDoneReminders?"▲ Hide":"▼ Show"} {reminders.filter(r=>r.done).length} completed</button>
                {showDoneReminders && doneRem.map(r=>(
                  <div key={r.id} style={{...S.row(false,false),opacity:0.5}}>
                    <button style={S.check(true)} onClick={()=>setReminders(p=>p.map(x=>x.id===r.id?{...x,done:false}:x))}>✓</button>
                    <div style={S.rowContent}><div style={{...S.rowTitle,textDecoration:"line-through",color:"#94a3b8"}}>{r.text}</div></div>
                    <button style={S.delBtn} onClick={()=>setReminders(p=>p.filter(x=>x.id!==r.id))}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={S.divider}/>

          <div style={S.secHeader}>
            <div><h2 style={S.secTitle}>🏗️ Property Management</h2><p style={S.secHint}>One-off jobs and repairs</p></div>
            <button style={S.addBtn} onClick={()=>setShowAddProperty(true)}>+ Add Job</button>
          </div>
          <div style={S.filterRow}>
            {["All",...PROPERTY_AREAS].map(area=>(
              <button key={area} style={S.pill(propertyFilter===area)} onClick={()=>setPropertyFilter(area)}>
                {area!=="All" && <span style={{width:7,height:7,borderRadius:"50%",background:propertyFilter===area?"white":areaColors[area],display:"inline-block"}}/>}
                {area}
              </button>
            ))}
          </div>
          <div style={S.listStack}>
            {activeTodos.length===0 && <div style={S.empty}>No property jobs yet. Tap + Add Job to log one.</div>}
            {activeTodos.map(todo=>(
              <div key={todo.id} style={S.todoCard}>
                <div style={S.todoTop}>
                  <button style={S.check(false)} onClick={()=>setPropertyTodos(p=>p.map(t=>t.id===todo.id?{...t,done:true}:t))}>✓</button>
                  <div style={S.rowContent}>
                    <div style={S.rowTitle}>{todo.title}</div>
                    <div style={S.rowMeta}>
                      <span style={S.tag(areaColors[todo.area]||"#64748b")}>{todo.area}</span>
                      <span style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600,background:priorityColors[todo.priority]+"20",color:priorityColors[todo.priority],border:"1px solid "+priorityColors[todo.priority]+"40"}}>{todo.priority}</span>
                      <span style={S.tagGray}>{new Date(todo.addedDate).toLocaleDateString()}</span>
                      {todo.owner && <span style={{fontSize:11,background:"#e0f2fe",color:"#0369a1",padding:"2px 7px",borderRadius:8,fontWeight:600}}>👤 {todo.owner}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <PhotoUpload small photo={todo.photo} onPhoto={photo=>setPropertyTodos(p=>p.map(t=>t.id===todo.id?{...t,photo}:t))}/>
                    {todo.notes && <button style={S.notesBtn} onClick={()=>setExpandedTodo(expandedTodo===todo.id?null:todo.id)}>{expandedTodo===todo.id?"▲":"▼"}</button>}
                    <button style={S.delBtn} onClick={()=>setPropertyTodos(p=>p.filter(t=>t.id!==todo.id))}>✕</button>
                  </div>
                </div>
                {todo.photo && <img src={todo.photo} alt="property" style={{maxWidth:"100%",maxHeight:140,objectFit:"cover",borderTop:"1px solid #f1f5f9",display:"block"}}/>}
                {expandedTodo===todo.id && todo.notes && <div style={S.todoNotes}>📝 {todo.notes}</div>}
              </div>
            ))}
            {propertyTodos.filter(t=>t.done).length>0 && (
              <div>
                <button style={S.moreBtn} onClick={()=>setShowDoneProp(!showDoneProp)}>{showDoneProp?"▲ Hide":"▼ Show"} {propertyTodos.filter(t=>t.done).length} completed</button>
                {showDoneProp && doneTodos.map(todo=>(
                  <div key={todo.id} style={{...S.todoCard,opacity:0.5}}>
                    <div style={S.todoTop}>
                      <button style={S.check(true)} onClick={()=>setPropertyTodos(p=>p.map(t=>t.id===todo.id?{...t,done:false}:t))}>✓</button>
                      <div style={S.rowContent}><div style={{...S.rowTitle,textDecoration:"line-through",color:"#94a3b8"}}>{todo.title}</div></div>
                      <button style={S.delBtn} onClick={()=>setPropertyTodos(p=>p.filter(t=>t.id!==todo.id))}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {showAddEquip && <EquipModal data={newEquip} setData={setNewEquip} onSave={addEquip} onClose={()=>setShowAddEquip(false)} title="Add New Equipment"/>}
          {editEquip && <EquipModal data={editEquip} setData={setEditEquip} onSave={saveEdit} onClose={()=>setEditEquip(null)} title="Edit Equipment"/>}

          {deleteEquipId && (
            <div style={S.overlay} onClick={()=>setDeleteEquipId(null)}>
              <div style={{...S.modal,maxWidth:360}} onClick={e=>e.stopPropagation()}>
                <h3 style={S.modalTitle}>Delete Equipment?</h3>
                <p style={{color:"#64748b",fontSize:14,marginBottom:20}}>Delete <strong>{equipment.find(e=>e.id===deleteEquipId)?.name}</strong>? This cannot be undone.</p>
                <div style={S.modalFoot}><button style={S.cancelBtn} onClick={()=>setDeleteEquipId(null)}>Cancel</button><button style={S.saveBtn("#dc2626")} onClick={()=>delEquip(deleteEquipId)}>Delete</button></div>
              </div>
            </div>
          )}

          {showAddReminder && (
            <div style={S.overlay} onClick={()=>setShowAddReminder(false)}>
              <div style={S.modal} onClick={e=>e.stopPropagation()}>
                <h3 style={S.modalTitle}>Add Household Reminder</h3>
                <div style={S.fg}><label style={S.lbl}>What needs doing? *</label><input style={S.inp} value={newReminder.text} placeholder="e.g. Clean gutters" onChange={e=>setNewReminder({...newReminder,text:e.target.value})}/></div>
                <div style={S.fg}><label style={S.lbl}>Category</label><div style={S.iconRow}>{REMINDER_CATS.map(cat=><button key={cat} style={S.catBtn(newReminder.category===cat,reminderCatColors[cat])} onClick={()=>setNewReminder({...newReminder,category:cat})}>{cat}</button>)}</div></div>
                <div style={S.fg}><label style={S.lbl}>Due Date</label><input type="date" style={S.inp} value={newReminder.dueDate} onChange={e=>setNewReminder({...newReminder,dueDate:e.target.value})}/></div>
                <div style={S.fg}><label style={S.lbl}>Repeats</label><select style={S.inp} value={newReminder.repeat} onChange={e=>setNewReminder({...newReminder,repeat:e.target.value})}><option value="none">Does not repeat</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select></div>
                <div style={S.fg}><label style={S.lbl}>Assigned To (optional)</label><input style={S.inp} value={newReminder.owner} placeholder="e.g. Dad, Mom, Kids..." onChange={e=>setNewReminder({...newReminder,owner:e.target.value})}/></div>
                <div style={S.fg}><label style={S.lbl}>Photo (optional)</label><PhotoUpload photo={newReminder.photo} onPhoto={photo=>setNewReminder({...newReminder,photo})}/></div>
                <div style={S.modalFoot}><button style={S.cancelBtn} onClick={()=>setShowAddReminder(false)}>Cancel</button><button style={S.saveBtn()} onClick={addReminder}>Add</button></div>
              </div>
            </div>
          )}

          {showAddProperty && (
            <div style={S.overlay} onClick={()=>setShowAddProperty(false)}>
              <div style={S.modal} onClick={e=>e.stopPropagation()}>
                <h3 style={S.modalTitle}>Add Property Job</h3>
                <div style={S.fg}><label style={S.lbl}>What needs doing? *</label><input style={S.inp} value={newTodo.title} placeholder="e.g. Fix fence panel" onChange={e=>setNewTodo({...newTodo,title:e.target.value})}/></div>
                <div style={S.fg}><label style={S.lbl}>Area</label><div style={S.iconRow}>{PROPERTY_AREAS.map(area=><button key={area} style={S.catBtn(newTodo.area===area,areaColors[area])} onClick={()=>setNewTodo({...newTodo,area})}>{area}</button>)}</div></div>
                <div style={S.fg}><label style={S.lbl}>Priority</label><div style={{display:"flex",gap:8}}>{PROPERTY_PRIORITIES.map(p=><button key={p} style={{...S.catBtn(newTodo.priority===p,priorityColors[p]),flex:1}} onClick={()=>setNewTodo({...newTodo,priority:p})}>{p}</button>)}</div></div>
                <div style={S.fg}><label style={S.lbl}>Notes</label><textarea style={{...S.inp,height:70,resize:"vertical"}} value={newTodo.notes} onChange={e=>setNewTodo({...newTodo,notes:e.target.value})}/></div>
                <div style={S.fg}><label style={S.lbl}>Assigned To (optional)</label><input style={S.inp} value={newTodo.owner} placeholder="e.g. Dad, Mom, Contractor..." onChange={e=>setNewTodo({...newTodo,owner:e.target.value})}/></div>
                <div style={S.fg}><label style={S.lbl}>Photo (optional)</label><PhotoUpload photo={newTodo.photo} onPhoto={photo=>setNewTodo({...newTodo,photo})}/></div>
                <div style={S.modalFoot}><button style={S.cancelBtn} onClick={()=>setShowAddProperty(false)}>Cancel</button><button style={S.saveBtn()} onClick={addTodo}>Add</button></div>
              </div>
            </div>
          )}

        </div>}

        {view==="detail" && currentEquip && <div>
          <button style={S.backBtn} onClick={()=>{setSelectedEquip(null);setView("dashboard");}}>← Back</button>
          <div style={S.detailCard}>
            {currentEquip.photo && <img src={currentEquip.photo} alt={currentEquip.name} style={{width:"100%",height:160,objectFit:"cover",borderRadius:"10px 10px 0 0",display:"block",marginBottom:16}}/>}
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{fontSize:40}}>{currentEquip.icon}</span>
              <div>
                <h2 style={{margin:0,fontSize:22,fontWeight:700}}>{currentEquip.name}</h2>
                <div style={{color:"#64748b",fontSize:13}}>{currentEquip.brand} · Model: <strong>{currentEquip.model}</strong></div>
                {currentEquip.serial && <div style={{color:"#64748b",fontSize:13}}>Serial: <strong>{currentEquip.serial}</strong></div>}
              </div>
              <button style={{...S.addBtn,marginLeft:"auto"}} onClick={()=>window.open("https://www.google.com/search?q="+encodeURIComponent(currentEquip.brand+" "+currentEquip.model+" parts"))}>🔍 Find Parts</button>
            </div>
          </div>
          <div style={S.tabs}>
            <button style={S.tab(activeTab==="tasks")} onClick={()=>setActiveTab("tasks")}>Maintenance Tasks</button>
            <button style={S.tab(activeTab==="history")} onClick={()=>setActiveTab("history")}>History</button>
          </div>
          {activeTab==="tasks" && <div style={S.listStack}>
            {currentEquip.tasks.length===0 && <div style={S.empty}>No tasks yet.</div>}
            {currentEquip.tasks.map(task=>{
              const days = getDaysUntil(task.lastDone, task.intervalDays);
              return (
                <div key={task.id} style={S.row(days<0,days>=0&&days<=7)}>
                  <div style={{flex:1}}>
                    <div style={S.rowTitle}>{task.name}</div>
                    <div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>Every {task.intervalDays} days · Last: {new Date(task.lastDone).toLocaleDateString()} · Due: {getDueDate(task.lastDone,task.intervalDays).toLocaleDateString()}</div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}><Badge days={days}/><button style={S.logBtn} onClick={()=>markDone(currentEquip.id,task.id)}>✓ Log Done</button></div>
                </div>
              );
            })}
          </div>}
          {activeTab==="history" && <div style={S.listStack}>
            {history.filter(h=>h.equipName===currentEquip.name).length===0 && <div style={S.empty}>No history yet.</div>}
            {history.filter(h=>h.equipName===currentEquip.name).map(h=>(
              <div key={h.id} style={S.row(false,false)}>
                <div style={{flex:1}}>
                  <div style={S.rowTitle}>{h.taskName}</div>
                  <div style={{fontSize:12,color:"#94a3b8"}}>{new Date(h.date).toLocaleDateString()}</div>
                  {h.note && <div style={{fontSize:13,color:"#64748b",marginTop:4,fontStyle:"italic"}}>📝 {h.note}</div>}
                </div>
              </div>
            ))}
          </div>}
        </div>}

        {view==="log" && <div>
          <h2 style={S.secTitle}>📋 Maintenance History</h2>
          <p style={{...S.secHint,marginBottom:16}}>All equipment maintenance you have recorded</p>
          {history.length===0 && <div style={S.empty}>No history yet! Log a completed task to see it here.</div>}
          {history.map(h=>(
            <div key={h.id} style={{...S.row(false,false),marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={S.rowTitle}><strong>{h.equipName}</strong> · {h.taskName}</div>
                <div style={{fontSize:12,color:"#94a3b8"}}>{new Date(h.date).toLocaleDateString()}</div>
                {h.note && <div style={{fontSize:13,color:"#64748b",marginTop:4,fontStyle:"italic"}}>📝 {h.note}</div>}
              </div>
            </div>
          ))}
        </div>}
      </main>

      {logModal && (
        <div style={S.overlay} onClick={()=>setLogModal(null)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <h3 style={S.modalTitle}>✓ Log Maintenance</h3>
            <p style={{color:"#64748b",fontSize:14,marginBottom:16}}>Recording: <strong>{logModal.task.name}</strong></p>
            <div style={S.fg}><label style={S.lbl}>Date Completed</label><input type="date" style={S.inp} value={logDate} onChange={e=>setLogDate(e.target.value)}/></div>
            <div style={S.fg}><label style={S.lbl}>Notes</label><textarea style={{...S.inp,height:80,resize:"vertical"}} value={logNote} onChange={e=>setLogNote(e.target.value)}/></div>
            <div style={S.modalFoot}><button style={S.cancelBtn} onClick={()=>setLogModal(null)}>Cancel</button><button style={S.saveBtn()} onClick={submitLog}>Save</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
